# =============================================================================
# Stayery Locations Reference Table
# =============================================================================
# Source: Data/Standorttabelle.xlsx
#
# Schema per location:
#   hotel_code:        6-letter apaleo property code (matches Excel sheet)
#   city:              City name (DE)
#   neighborhood:      Optional district / quarter - automatically generated 
#   bundesland:        ISO-3166-2 region code, used for school holiday lookup
#                      BE=Berlin, BW=Baden-Württemberg, BY=Bayern, HB=Bremen,
#                      HE=Hessen, HH=Hamburg, MV=Mecklenburg-Vorpommern,
#                      NI=Niedersachsen, NW=Nordrhein-Westfalen, RP=Rheinland-Pfalz,
#                      SH=Schleswig-Holstein, SL=Saarland, SN=Sachsen,
#                      ST=Sachsen-Anhalt, TH=Thüringen, BB=Brandenburg
#   opening_date:      First day of operation (YYYY-MM-DD). null = TBD.
#   units_total:       Number of bookable units (apartments)
#   capacity_changes:  Optional list of {date, units_total} for renovations / extensions
#   notes:             Free text
# =============================================================================

