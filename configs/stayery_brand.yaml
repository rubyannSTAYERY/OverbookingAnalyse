# =============================================================================
# Stayery Brand Configuration
# =============================================================================

colors: # this is a nested dictionary defining the color palette for the Stayery brand, organized into core and supporting colors.
  core:
    black:  "#000000"   # Text on light backgrounds
    white:  "#FFFFFF"   # Default chart background
    yellow: "#FFE650"   # Brand-defining accent
  supporting:
    pink:   "#F0B4C8"
    green:  "#08A064"
    orange: "#EB6E14"
    red:    "#E62828"
    blue:   "#1E4BA1"
    purple: "#6E32C8"

# Order in which colors are assigned to chart series.
# Yellow leads as brand-defining accent; supporting colors follow in
# perceptually distinct order to maximize readability across categories.
# Limited to ~6 to honor the "1-2 supporting colours per layout" principle —
# if a chart needs more, the palette recycles  - needs to be tested and potentially adjusted in the chart
categorical_order:
  - yellow
  - blue
  - green
  - orange
  - pink
  - purple

# Sequential palette anchor — single-hue gradient toward this color.
# Used for heatmaps, choropleth-like encodings, occupancy matrices.
sequential_anchor: yellow

# Diverging palette — for YoY % change, anomaly residuals, target deviation.
diverging:
  negative: red
  neutral:  white
  positive: green

typography:
  # Primary brand font for all text. Must be installed system-wide for
  # full fidelity. Fallback chain ensures readable output everywhere.
  primary: "Neue Haas Grotesk Display Pro"
  primary_fallback:
    - "Neue Haas Grotesk"
    - "NeueHaasGroteskTextPro"
    - "Inter"
    - "Helvetica Neue"
    - "Helvetica"
    - "Arial"
    - "sans-serif"

  # Display font for occasional emphasis (titles, callouts).
  display: "Topol"
  display_fallback:
    - "Topol"
    - "Inter"
    - "sans-serif"
